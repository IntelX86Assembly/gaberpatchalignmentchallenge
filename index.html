<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Image Button Keyboard Demo</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #121212;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
    }

    /* Navbar */
    .navbar {
      width: 100%;
      height: 60px;
      background-color: #1f1f1f;
      display: flex;
      align-items: center;
      padding: 0 15px;
      box-sizing: border-box;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 1000;
    }

    /* Hamburger */
    .hamburger {
      font-size: 26px;
      cursor: pointer;
      user-select: none;
    }

    /* Sidebar menu */
    .sidebar {
      position: fixed;
      top: 0;
      left: -250px;
      width: 250px;
      height: 100%;
      background-color: #1e1e1e;
      padding-top: 60px;
      transition: 0.3s;
      box-shadow: 2px 0 5px rgba(0,0,0,0.5);
      z-index: 999;
    }

    .sidebar a {
      display: block;
      padding: 15px 20px;
      color: white;
      text-decoration: none;
      font-size: 18px;
    }

    .sidebar a:hover {
      background-color: #333;
    }

    .sidebar.open {
      left: 0;
    }

    /* Main content spacing below navbar */
    .content {
      margin-top: 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .image-container {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
    }

    .image-container img {
      width: 150px;
      height: 150px;
      object-fit: cover;
      border-radius: 8px;
    }

    .button-container {
      display: flex;
      gap: 15px;
    }

    button {
      padding: 10px 20px;
      font-size: 18px;
      cursor: pointer;
      background-color: #333;
      color: white;
      border: none;
      border-radius: 6px;
    }

    button:hover {
      background-color: #555;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <div class="navbar">
    <div class="hamburger" onclick="toggleMenu()">☰</div>
  </div>

  <!-- Sidebar -->
  <div id="sidebar" class="sidebar">
    <a href="#">Alignment Challenge</a>
    <a href="#">Contrast Challenge</a>
    <a href="#">Frequency Challenge</a>
  </div>

  <!-- Main Content -->
  <div class="content">
    <div class="image-container">
      <img src="https://via.placeholder.com/150?text=1" alt="Image 1">
      <img src="https://via.placeholder.com/150?text=2" alt="Image 2">
      <img src="https://via.placeholder.com/150?text=3" alt="Image 3">
    </div>

    <div class="button-container">
      <button onclick="handleInput(1)">1</button>
      <button onclick="handleInput(2)">2</button>
      <button onclick="handleInput(3)">3</button>
    </div>
  </div>

  <script>
    function handleInput(num) {
      console.log("Button or key pressed:", num);
    }

    document.addEventListener("keydown", function(event) {
      if (event.key === "1" || event.key === "2" || event.key === "3") {
        handleInput(event.key);
      }
    });

    function toggleMenu() {
      const sidebar = document.getElementById("sidebar");
      sidebar.classList.toggle("open");
    }
  </script>

</body>
</html>
