<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Visual Challenge</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #121212;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
    }

    /* Glow animations */
    body.glow-green { animation: glowGreen 0.5s ease; }
    body.glow-red { animation: glowRed 0.5s ease; }

    @keyframes glowGreen {
      0% { box-shadow: 0 0 0px limegreen inset; }
      50% { box-shadow: 0 0 25px 8px limegreen inset; }
      100% { box-shadow: 0 0 0px inset; }
    }

    @keyframes glowRed {
      0% { box-shadow: 0 0 0px red inset; }
      50% { box-shadow: 0 0 25px 8px red inset; }
      100% { box-shadow: 0 0 0px inset; }
    }

    /* Navbar */
    .navbar {
      width: 100%;
      height: 60px;
      background: #1f1f1f;
      display: flex;
      align-items: center;
      padding: 0 15px;
      position: fixed;
      top: 0;
      left: 0;
    }

    .hamburger {
      font-size: 26px;
      cursor: pointer;
    }

    /* Sidebar */
    .sidebar {
      position: fixed;
      top: 0;
      left: -250px;
      width: 250px;
      height: 100%;
      background: #1e1e1e;
      padding-top: 60px;
      transition: left 0.3s ease;
    }

    .sidebar.open { left: 0; }

    .sidebar a {
      display: block;
      padding: 15px;
      color: white;
      text-decoration: none;
    }

    .sidebar a:hover { background: #333; }

    /* Content */
    .content {
      margin-top: 80px;
      text-align: center;
    }

    .image-container {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
    }

    .image-container img {
      width: 150px;
      height: 150px;
      border-radius: 8px;
      object-fit: cover;
    }

    .button-container {
      display: flex;
      gap: 15px;
      justify-content: center;
    }

    button {
      padding: 10px 20px;
      font-size: 18px;
      cursor: pointer;
      background: #333;
      color: white;
      border: none;
      border-radius: 6px;
    }

    button:hover { background: #555; }
  </style>
</head>
<body>

  <div class="navbar">
    <div class="hamburger" id="hamburger">☰</div>
  </div>

  <div id="sidebar" class="sidebar">
    <a href="#">Alignment Challenge</a>
    <a href="#">Contrast Challenge</a>
    <a href="#">Frequency Challenge</a>
  </div>

  <div class="content">
    <div class="image-container">
      <img id="img1">
      <img id="img2">
      <img id="img3">
    </div>

    <div class="button-container">
      <button data-num="1">1</button>
      <button data-num="2">2</button>
      <button data-num="3">3</button>
    </div>
  </div>

  <script>
    const sidebar = document.getElementById("sidebar");
    const hamburger = document.getElementById("hamburger");

    const imgEls = [
      document.getElementById("img1"),
      document.getElementById("img2"),
      document.getElementById("img3")
    ];

    // === IMAGE GROUPS (replace filenames with your actual images) ===
    const images = [
      ["images/g1_a.jpg","images/g1_b.jpg","images/g1_c.jpg"],
      ["images/g2_a.jpg","images/g2_b.jpg","images/g2_c.jpg"],
      ["images/g3_a.jpg","images/g3_b.jpg","images/g3_c.jpg"],
      ["images/g4_a.jpg","images/g4_b.jpg","images/g4_c.jpg"]
    ];

    let correctValue = 1;

    function newRound() {
      const group = images[Math.floor(Math.random() * images.length)];

      const oddIndex = Math.floor(Math.random() * 3);
      const oddPosition = Math.floor(Math.random() * 3);

      const sameIndexes = [0,1,2].filter(i => i !== oddIndex);
      const sameImage = group[sameIndexes[Math.floor(Math.random() * 2)]];
      const oddImage = group[oddIndex];

      const display = [];
      for (let i = 0; i < 3; i++) {
        display[i] = (i === oddPosition) ? oddImage : sameImage;
      }

      imgEls.forEach((img, i) => img.src = display[i]);

      correctValue = oddPosition + 1;
    }

    // Sidebar behavior
    hamburger.addEventListener("click", () => {
      sidebar.classList.toggle("open");
    });

    document.addEventListener("click", (e) => {
      if (!sidebar.contains(e.target) && !hamburger.contains(e.target)) {
        sidebar.classList.remove("open");
      }
    });

    // Audio
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function tone(freq, time) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.value = freq;
      osc.start();
      gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + time);
    }

    function correctSound() {
      tone(600, 0.1);
      setTimeout(() => tone(900, 0.15), 100);
    }

    function wrongSound() {
      tone(200, 0.2);
    }

    function glow(type) {
      document.body.classList.remove("glow-green", "glow-red");
      void document.body.offsetWidth;
      document.body.classList.add(type);
    }

    function handleInput(num) {
      if (Number(num) === correctValue) {
        glow("glow-green");
        correctSound();
      } else {
        glow("glow-red");
        wrongSound();
      }

      setTimeout(newRound, 600);
    }

    // Buttons
    document.querySelectorAll("button").forEach(btn => {
      btn.addEventListener("click", () => handleInput(btn.dataset.num));
    });

    // Keyboard
    document.addEventListener("keydown", (e) => {
      if (["1","2","3"].includes(e.key)) handleInput(e.key);
    });

    // Start first round
    newRound();
  </script>

</body>
</html>
