<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Image Button Keyboard Demo</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #121212;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
    }

    /* Glow animations */
    body.glow-green {
      animation: glowGreen 0.5s ease;
    }

    body.glow-red {
      animation: glowRed 0.5s ease;
    }

    @keyframes glowGreen {
      0%   { box-shadow: 0 0 0px limegreen inset; }
      50%  { box-shadow: 0 0 25px 8px limegreen inset; }
      100% { box-shadow: 0 0 0px limegreen inset; }
    }

    @keyframes glowRed {
      0%   { box-shadow: 0 0 0px red inset; }
      50%  { box-shadow: 0 0 25px 8px red inset; }
      100% { box-shadow: 0 0 0px red inset; }
    }

    .navbar {
      width: 100%;
      height: 60px;
      background-color: #1f1f1f;
      display: flex;
      align-items: center;
      padding: 0 15px;
      position: fixed;
      top: 0;
      left: 0;
    }

    .hamburger {
      font-size: 26px;
      cursor: pointer;
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: -250px;
      width: 250px;
      height: 100%;
      background-color: #1e1e1e;
      padding-top: 60px;
      transition: left 0.3s ease;
    }

    .sidebar.open {
      left: 0;
    }

    .sidebar a {
      display: block;
      padding: 15px 20px;
      color: white;
      text-decoration: none;
    }

    .sidebar a:hover {
      background-color: #333;
    }

    .content {
      margin-top: 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .image-container {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
    }

    .image-container img {
      width: 150px;
      height: 150px;
      border-radius: 8px;
    }

    .button-container {
      display: flex;
      gap: 15px;
    }

    button {
      padding: 10px 20px;
      font-size: 18px;
      cursor: pointer;
      background-color: #333;
      color: white;
      border: none;
      border-radius: 6px;
    }

    button:hover {
      background-color: #555;
    }
  </style>
</head>
<body>

  <div class="navbar">
    <div class="hamburger" id="hamburger">☰</div>
  </div>

  <div id="sidebar" class="sidebar">
    <a href="#">Alignment Challenge</a>
    <a href="#">Contrast Challenge</a>
    <a href="#">Frequency Challenge</a>
  </div>

  <div class="content">
    <div class="image-container">
      <img src="https://via.placeholder.com/150?text=1">
      <img src="https://via.placeholder.com/150?text=2">
      <img src="https://via.placeholder.com/150?text=3">
    </div>

    <div class="button-container">
      <button data-num="1">1</button>
      <button data-num="2">2</button>
      <button data-num="3">3</button>
    </div>
  </div>

  <script>
    const sidebar = document.getElementById("sidebar");
    const hamburger = document.getElementById("hamburger");
    const correctValue = 2;

    // Audio setup
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playTone(freq, duration) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.frequency.value = freq;
      osc.type = "sine";

      osc.start();
      gain.gain.setValueAtTime(0.2, audioCtx.currentTime);

      osc.stop(audioCtx.currentTime + duration);
    }

    function playCorrectSound() {
      playTone(600, 0.1);
      setTimeout(() => playTone(900, 0.15), 100);
    }

    function playWrongSound() {
      playTone(200, 0.2);
    }

    hamburger.addEventListener("click", () => {
      sidebar.classList.toggle("open");
    });

    document.addEventListener("click", (e) => {
      if (!sidebar.contains(e.target) && !hamburger.contains(e.target)) {
        sidebar.classList.remove("open");
      }
    });

    function triggerGlow(className) {
      document.body.classList.remove("glow-green", "glow-red");
      void document.body.offsetWidth; // restart animation
      document.body.classList.add(className);
    }

    function handleInput(num) {
      if (Number(num) === correctValue) {
        triggerGlow("glow-green");
        playCorrectSound();
      } else {
        triggerGlow("glow-red");
        playWrongSound();
      }
    }

    document.querySelectorAll("button").forEach(btn => {
      btn.addEventListener("click", () => {
        handleInput(btn.dataset.num);
      });
    });

    document.addEventListener("keydown", (e) => {
      if (["1","2","3"].includes(e.key)) {
        handleInput(e.key);
      }
    });
  </script>

</body>
</html>
