<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Image Button Keyboard Demo</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #121212;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
    }

    /* Temporary glow animation */
    body.glow {
      animation: glowFlash 0.5s ease;
    }

    @keyframes glowFlash {
      0%   { box-shadow: 0 0 0px limegreen inset; }
      50%  { box-shadow: 0 0 25px 8px limegreen inset; }
      100% { box-shadow: 0 0 0px limegreen inset; }
    }

    /* Navbar */
    .navbar {
      width: 100%;
      height: 60px;
      background-color: #1f1f1f;
      display: flex;
      align-items: center;
      padding: 0 15px;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 1000;
    }

    .hamburger {
      font-size: 26px;
      cursor: pointer;
    }

    /* Sidebar */
    .sidebar {
      position: fixed;
      top: 0;
      left: -250px;
      width: 250px;
      height: 100%;
      background-color: #1e1e1e;
      padding-top: 60px;
      transition: left 0.3s ease;
      z-index: 999;
    }

    .sidebar.open {
      left: 0;
    }

    .sidebar a {
      display: block;
      padding: 15px 20px;
      color: white;
      text-decoration: none;
      font-size: 18px;
    }

    .sidebar a:hover {
      background-color: #333;
    }

    .content {
      margin-top: 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .image-container {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
    }

    .image-container img {
      width: 150px;
      height: 150px;
      border-radius: 8px;
    }

    .button-container {
      display: flex;
      gap: 15px;
    }

    button {
      padding: 10px 20px;
      font-size: 18px;
      cursor: pointer;
      background-color: #333;
      color: white;
      border: none;
      border-radius: 6px;
    }

    button:hover {
      background-color: #555;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <div class="navbar">
    <div class="hamburger" id="hamburger">☰</div>
  </div>

  <!-- Sidebar -->
  <div id="sidebar" class="sidebar">
    <a href="#">Alignment Challenge</a>
    <a href="#">Contrast Challenge</a>
    <a href="#">Frequency Challenge</a>
  </div>

  <!-- Main Content -->
  <div class="content">
    <div class="image-container">
      <img src="https://via.placeholder.com/150?text=1">
      <img src="https://via.placeholder.com/150?text=2">
      <img src="https://via.placeholder.com/150?text=3">
    </div>

    <div class="button-container">
      <button data-num="1">1</button>
      <button data-num="2">2</button>
      <button data-num="3">3</button>
    </div>
  </div>

  <script>
    const sidebar = document.getElementById("sidebar");
    const hamburger = document.getElementById("hamburger");
    const correctValue = 2;

    // Toggle sidebar
    hamburger.addEventListener("click", () => {
      sidebar.classList.toggle("open");
    });

    // Close sidebar when clicking outside
    document.addEventListener("click", (e) => {
      if (!sidebar.contains(e.target) && !hamburger.contains(e.target)) {
        sidebar.classList.remove("open");
      }
    });

    // Single handler for both buttons + keyboard
    function handleInput(num) {
      console.log("Pressed:", num);

      if (Number(num) === correctValue) {
        document.body.classList.remove("glow"); // reset animation
        void document.body.offsetWidth; // force reflow so animation restarts
        document.body.classList.add("glow");
      }
    }

    // Button clicks (no inline JS anymore)
    document.querySelectorAll("button").forEach(btn => {
      btn.addEventListener("click", () => {
        handleInput(btn.dataset.num);
      });
    });

    // Keyboard input
    document.addEventListener("keydown", (e) => {
      if (["1","2","3"].includes(e.key)) {
        handleInput(e.key);
      }
    });
  </script>

</body>
</html>
