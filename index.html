<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Visual Challenge</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background-color: #121212;
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
}

/* NAVBAR */
.navbar {
  width: 100%;
  height: 60px;
  background: #1f1f1f;
  display: flex;
  align-items: center;
  padding: 0 15px;
  position: fixed;
  top: 0;
  left: 0;
}

.hamburger { font-size: 26px; cursor: pointer; }
.settings { margin-left: auto; cursor: pointer; }

/* LEVEL */
.level-indicator {
  position: fixed;
  top: 70px;
  left: 15px;
  font-size: 14px;
}

/* CONTENT */
.content {
  text-align: center;
  margin-top: 110px;
}

.score { margin-bottom: 10px; }

/* PROGRESS */
.progress-bar {
  width: 300px;
  height: 10px;
  background: #333;
  border-radius: 10px;
  overflow: hidden;
  margin: 10px auto 15px;
}

#progressFill {
  height: 100%;
  width: 0%;
  background: limegreen;
}

/* HELP */
.help-icon {
  position: fixed;
  top: 70px;
  right: 20px;
  width: 25px;
  height: 25px;
  background: #444;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

.tooltip {
  position: fixed;
  top: 100px;
  right: 20px;
  background: #222;
  padding: 10px;
  display: none;
}

/* POPUP */
.popup {
  position: fixed;
  top:0;left:0;
  width:100%;height:100%;
  background: rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
}
</style>
</head>

<body>

<div class="navbar">
  <div class="hamburger" id="hamburger">☰</div>
  <div class="settings">⚙️</div>
</div>

<div class="level-indicator">
  Level: <span id="levelDisplay">1</span>
</div>

<div class="help-icon" id="helpIcon">?</div>
<div class="tooltip" id="tooltip">
  This mode trains visual alignment. The ability of your brain to process and discriminate between visual offsets.
</div>

<div class="content">

  <div class="score">
    Correct: <span id="correctScore">0</span> /
    Incorrect: <span id="wrongScore">0</span> |
    Streak: <span id="streak">0</span>
  </div>

  <div class="progress-bar">
    <div id="progressFill"></div>
  </div>

  <div class="image-container">
    <img id="img1"><img id="img2"><img id="img3">
  </div>

  <div class="button-container">
    <button data-num="1">1</button>
    <button data-num="2">2</button>
    <button data-num="3">3</button>
  </div>
</div>

<div class="popup" id="popup">
  <div>
    <h2>Training Complete</h2>
    <button onclick="location.reload()">Continue</button>
  </div>
</div>

<script>

/* ===== IMAGE POOLS (STRUCTURE PRESERVED) ===== */
const imagePools = {
  1: [
    [
      "images/gabor-gaussian--1.00-96-12.00-0.10-0.00-128-128-128-255-255-255-0-0-0.png",
      "images/gabor-gaussian-0.00-96-12.00-0.10-0.00-128-128-128-255-255-255-0-0-0.png",
      "images/gabor-gaussian-1.00-96-12.00-0.10-0.00-128-128-128-255-255-255-0-0-0.png"
    ],
    [
      "images/gabor-gaussian-44.00-96-12.00-0.10-0.00-128-128-128-255-255-255-0-0-0.png",
      "images/gabor-gaussian-45.00-96-12.00-0.10-0.00-128-128-128-255-255-255-0-0-0.png",
      "images/gabor-gaussian-46.00-96-12.00-0.10-0.00-128-128-128-255-255-255-0-0-0.png"
    ],
    [
      "images/gabor-gaussian-89.00-96-12.00-0.10-0.00-128-128-128-255-255-255-0-0-0.png",
      "images/gabor-gaussian-90.00-96-12.00-0.10-0.00-128-128-128-255-255-255-0-0-0.png",
      "images/gabor-gaussian-91.00-96-12.00-0.10-0.00-128-128-128-255-255-255-0-0-0.png"
    ],
    [
      "images/gabor-gaussian--46.00-96-12.00-0.10-0.00-128-128-128-255-255-255-0-0-0.png",
      "images/gabor-gaussian--45.00-96-12.00-0.10-0.00-128-128-128-255-255-255-0-0-0.png",
      "images/gabor-gaussian--44.00-96-12.00-0.10-0.00-128-128-128-255-255-255-0-0-0.png"
    ]
  ],

  /* MEDIUM (smaller differences) */
  2: [
    [
      "images/gabor-gaussian--0.50-96-12.00-0.10-0.00-128-128-128-255-255-255-0-0-0.png",
      "images/gabor-gaussian-0.00-96-12.00-0.10-0.00-128-128-128-255-255-255-0-0-0.png",
      "images/gabor-gaussian-0.50-96-12.00-0.10-0.00-128-128-128-255-255-255-0-0-0.png"
    ],
    [
      "images/gabor-gaussian-44.50-96-12.00-0.10-0.00-128-128-128-255-255-255-0-0-0.png",
      "images/gabor-gaussian-45.00-96-12.00-0.10-0.00-128-128-128-255-255-255-0-0-0.png",
      "images/gabor-gaussian-45.50-96-12.00-0.10-0.00-128-128-128-255-255-255-0-0-0.png"
    ],
    [
      "images/gabor-gaussian-89.50-96-12.00-0.10-0.00-128-128-128-255-255-255-0-0-0.png",
      "images/gabor-gaussian-90.00-96-12.00-0.10-0.00-128-128-128-255-255-255-0-0-0.png",
      "images/gabor-gaussian-90.50-96-12.00-0.10-0.00-128-128-128-255-255-255-0-0-0.png"
    ],
    [
      "images/gabor-gaussian--45.50-96-12.00-0.10-0.00-128-128-128-255-255-255-0-0-0.png",
      "images/gabor-gaussian--45.00-96-12.00-0.10-0.00-128-128-128-255-255-255-0-0-0.png",
      "images/gabor-gaussian--44.50-96-12.00-0.10-0.00-128-128-128-255-255-255-0-0-0.png"
    ]
  ],

  /* HARD (very small differences) */
  3: [
    [
      "images/gabor-gaussian--0.25-96-12.00-0.10-0.00-128-128-128-255-255-255-0-0-0.png",
      "images/gabor-gaussian-0.00-96-12.00-0.10-0.00-128-128-128-255-255-255-0-0-0.png",
      "images/gabor-gaussian-0.25-96-12.00-0.10-0.00-128-128-128-255-255-255-0-0-0.png"
    ],
    [
      "images/gabor-gaussian-44.75-96-12.00-0.10-0.00-128-128-128-255-255-255-0-0-0.png",
      "images/gabor-gaussian-45.00-96-12.00-0.10-0.00-128-128-128-255-255-255-0-0-0.png",
      "images/gabor-gaussian-45.25-96-12.00-0.10-0.00-128-128-128-255-255-255-0-0-0.png"
    ],
    [
      "images/gabor-gaussian-89.75-96-12.00-0.10-0.00-128-128-128-255-255-255-0-0-0.png",
      "images/gabor-gaussian-90.00-96-12.00-0.10-0.00-128-128-128-255-255-255-0-0-0.png",
      "images/gabor-gaussian-90.25-96-12.00-0.10-0.00-128-128-128-255-255-255-0-0-0.png"
    ],
    [
      "images/gabor-gaussian--45.25-96-12.00-0.10-0.00-128-128-128-255-255-255-0-0-0.png",
      "images/gabor-gaussian--45.00-96-12.00-0.10-0.00-128-128-128-255-255-255-0-0-0.png",
      "images/gabor-gaussian--44.75-96-12.00-0.10-0.00-128-128-128-255-255-255-0-0-0.png"
    ]
  ]
};

/* ===== STATE ===== */
let correct=0, wrong=0, streak=0, round=0;
let level=1;
const MAX=20;
let correctValue=1;
let locked=false;

/* ===== UPDATE UI ===== */
function update(){
  correctScore.textContent=correct;
  wrongScore.textContent=wrong;
  streak.textContent=streak;
  levelDisplay.textContent=level;
  progressFill.style.width=(round/MAX)*100+"%";
}

/* ===== NEW ROUND ===== */
function newRound(){

  if(round>=MAX){
    const acc=correct/MAX;

    if(acc>=0.8 && level<3) level++;
    else if(acc<=0.6 && level>1) level--;

    popup.style.display="flex";
    return;
  }

  round++;
  locked=false;

  const pool=imagePools[level];
  const g=pool[Math.floor(Math.random()*pool.length)];

  const oddIndex=Math.floor(Math.random()*3);
  const sameIndex=(oddIndex+1)%3;

  let display=[g[sameIndex], g[sameIndex], g[sameIndex]];
  display[Math.floor(Math.random()*3)] = g[oddIndex];

  display = display.sort(()=>Math.random()-0.5);

  img1.src=display[0];
  img2.src=display[1];
  img3.src=display[2];

  correctValue = display.indexOf(g[oddIndex]) + 1;

  update();
}

/* ===== HANDLE ===== */
function handle(n){
  if(locked)return;
  locked=true;

  if(Number(n)===correctValue){
    correct++; streak++;
  } else {
    wrong++; streak=0;
  }

  update();
  setTimeout(newRound,400);
}

/* ===== EVENTS ===== */
document.querySelectorAll(".button-container button")
.forEach(b=>b.onclick=()=>handle(b.dataset.num));

helpIcon.onmouseenter=()=>tooltip.style.display="block";
helpIcon.onmouseleave=()=>tooltip.style.display="none";

/* START */
newRound();
update();

</script>
</body>
</html>
</body>
</html>
