<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Visual Challenge</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #121212;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100vh;
  }

  body.glow-green { animation: glowGreen 0.5s ease; }
  body.glow-red { animation: glowRed 0.5s ease; }

  @keyframes glowGreen {
    0% { box-shadow: 0 0 0px limegreen inset; }
    50% { box-shadow: 0 0 25px 8px limegreen inset; }
    100% { box-shadow: 0 0 0px inset; }
  }

  @keyframes glowRed {
    0% { box-shadow: 0 0 0px red inset; }
    50% { box-shadow: 0 0 25px 8px red inset; }
    100% { box-shadow: 0 0 0px inset; }
  }

  /* NAVBAR */
  .navbar {
    width: 100%;
    height: 60px;
    background: #1f1f1f;
    display: flex;
    align-items: center;
    padding: 0 15px;
    position: fixed;
    top: 0;
    left: 0;
    z-index: 1100;
  }

  .hamburger {
    font-size: 26px;
    cursor: pointer;
  }

  /* SIDEBAR */
  .sidebar {
    position: fixed;
    top: 0;
    left: -250px;
    width: 250px;
    height: 100%;
    background: #1e1e1e;
    padding-top: 60px;
    transition: left 0.3s ease;
    z-index: 1000;
  }

  .sidebar.open { left: 0; }

  .sidebar a {
    display: block;
    padding: 15px;
    color: white;
    text-decoration: none;
  }

  .sidebar a:hover { background: #333; }

  /* CONTENT */
  .content {
    margin-top: 80px;
    text-align: center;
  }

  .score {
    margin-bottom: 10px;
    font-size: 18px;
  }

  .image-container {
    display: flex;
    gap: 20px;
    margin-bottom: 12px;
  }

  .image-container img {
    width: 150px;
    height: 150px;
    border-radius: 8px;
    object-fit: cover;
  }

  .button-container {
    display: flex;
    gap: 15px;
    justify-content: center;
    margin-top: 6px;
  }

  button {
    padding: 10px 20px;
    font-size: 18px;
    cursor: pointer;
    background: #333;
    color: white;
    border: none;
    border-radius: 6px;
  }

  button:hover { background: #555; }

  /* POPUP */
  .popup {
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.85);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 2000;
  }

  .popup-content {
    background: #222;
    padding: 30px;
    border-radius: 10px;
    text-align: center;
  }
</style>
</head>

<body>

<div class="navbar">
  <div class="hamburger" id="hamburger">☰</div>
</div>

<div id="sidebar" class="sidebar">
  <a href="#">Alignment Challenge</a>
  <a href="#">Contrast Challenge</a>
  <a href="#">Frequency Challenge</a>
  <a href="performance.html">View Performance</a>
</div>

<div class="content">

  <div class="score">
    Correct: <span id="correctScore">0</span> /
    Incorrect: <span id="wrongScore">0</span>
  </div>

  <div class="image-container">
    <img id="img1">
    <img id="img2">
    <img id="img3">
  </div>

  <div class="button-container">
    <button data-num="1">1</button>
    <button data-num="2">2</button>
    <button data-num="3">3</button>
  </div>
</div>

<div class="popup" id="popup">
  <div class="popup-content">
    <h2>Training Complete</h2>
    <button onclick="location.reload()">Continue Training</button>
    <button onclick="window.location.href='performance.html'">View Performance</button>
  </div>
</div>

<script>
/* =========================
   ELEMENTS
========================= */
const sidebar = document.getElementById("sidebar");
const hamburger = document.getElementById("hamburger");

const imgEls = [
  document.getElementById("img1"),
  document.getElementById("img2"),
  document.getElementById("img3")
];

const correctEl = document.getElementById("correctScore");
const wrongEl = document.getElementById("wrongScore");
const popup = document.getElementById("popup");

/* =========================
   AUDIO FIX (RELIABLE)
========================= */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function unlockAudio() {
  if (audioCtx.state === "suspended") {
    audioCtx.resume();
  }
}

document.addEventListener("click", unlockAudio, { once: true });
document.addEventListener("keydown", unlockAudio, { once: true });

function tone(freq, time) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.frequency.value = freq;

  gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + time);

  osc.start();
  osc.stop(audioCtx.currentTime + time);
}

function correctSound() {
  tone(600, 0.1);
  setTimeout(() => tone(900, 0.15), 100);
}

function wrongSound() {
  tone(200, 0.2);
}

/* =========================
   SIDEBAR FIX
========================= */
hamburger.addEventListener("click", (e) => {
  e.stopPropagation();
  sidebar.classList.toggle("open");
});

document.addEventListener("click", (e) => {
  if (!sidebar.contains(e.target) && !hamburger.contains(e.target)) {
    sidebar.classList.remove("open");
  }
});

/* =========================
   GAME STATE
========================= */
const images = [
  [
    "images/gabor-gaussian--1.00-96-12.00-0.10-0.00-128-128-128-255-255-255-0-0-0.png",
    "images/gabor-gaussian-0.00-96-12.00-0.10-0.00-128-128-128-255-255-255-0-0-0.png",
    "images/gabor-gaussian-1.00-96-12.00-0.10-0.00-128-128-128-255-255-255-0-0-0.png"
  ],
  [
    "images/gabor-gaussian-44.00-96-12.00-0.10-0.00-128-128-128-255-255-255-0-0-0.png",
    "images/gabor-gaussian-45.00-96-12.00-0.10-0.00-128-128-128-255-255-255-0-0-0.png",
    "images/gabor-gaussian-46.00-96-12.00-0.10-0.00-128-128-128-255-255-255-0-0-0.png"
  ],
  [
    "images/gabor-gaussian-89.00-96-12.00-0.10-0.00-128-128-128-255-255-255-0-0-0.png",
    "images/gabor-gaussian-90.00-96-12.00-0.10-0.00-128-128-128-255-255-255-0-0-0.png",
    "images/gabor-gaussian-91.00-96-12.00-0.10-0.00-128-128-128-255-255-255-0-0-0.png"
  ],
  [
    "images/gabor-gaussian--46.00-96-12.00-0.10-0.00-128-128-128-255-255-255-0-0-0.png",
    "images/gabor-gaussian--45.00-96-12.00-0.10-0.00-128-128-128-255-255-255-0-0-0.png",
    "images/gabor-gaussian--44.00-96-12.00-0.10-0.00-128-128-128-255-255-255-0-0-0.png"
  ]
];

let correct = 0;
let wrong = 0;
let round = 0;
const MAX_ROUNDS = 20;
let correctValue = 1;
let locked = false;

/* =========================
   UI
========================= */
function updateScore() {
  correctEl.textContent = correct;
  wrongEl.textContent = wrong;
}

function glow(type) {
  document.body.classList.remove("glow-green", "glow-red");
  void document.body.offsetWidth;
  document.body.classList.add(type);

  setTimeout(() => {
    document.body.classList.remove(type);
  }, 400);
}

/* =========================
   GAME LOGIC
========================= */
function shuffle(arr) {
  return arr.sort(() => Math.random() - 0.5);
}

function newRound() {
  if (round >= MAX_ROUNDS) {
    popup.style.display = "flex";
    return;
  }

  locked = false;
  round++;

  const group = images[Math.floor(Math.random() * images.length)];
  const oddIndex = Math.floor(Math.random() * 3);

  const sameIndexes = [0,1,2].filter(i => i !== oddIndex);
  const sameImage = group[sameIndexes[Math.floor(Math.random() * 2)]];
  const oddImage = group[oddIndex];

  let display = [sameImage, sameImage, sameImage];

  const oddPosition = Math.floor(Math.random() * 3);
  display[oddPosition] = oddImage;

  display = shuffle(display);

  imgEls.forEach((img, i) => img.src = display[i]);

  correctValue = display.indexOf(oddImage) + 1;
}

/* =========================
   INPUT
========================= */
function handleInput(num) {
  if (locked) return;
  locked = true;

  if (Number(num) === correctValue) {
    correct++;
    glow("glow-green");
    correctSound();
  } else {
    wrong++;
    glow("glow-red");
    wrongSound();
  }

  updateScore();
  setTimeout(newRound, 400);
}

/* =========================
   EVENTS
========================= */
document.querySelectorAll("button").forEach(btn => {
  btn.addEventListener("click", () => handleInput(btn.dataset.num));
});

document.addEventListener("keydown", (e) => {
  if (["1","2","3"].includes(e.key)) handleInput(e.key);
});

/* START */
newRound();
updateScore();
</script>

</body>
</html>
