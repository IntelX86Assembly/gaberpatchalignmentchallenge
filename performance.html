<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Performance</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{
  margin:0;
  background:#121212;
  color:white;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.card{
  background:#1f1f1f;
  padding:20px;
  border-radius:10px;
  width:450px;
}
canvas{margin-top:15px;}
</style>
</head>

<body>
<div class="card">
<h2>Performance History</h2>

<canvas id="chart"></canvas>
</div>

<script>
const history = JSON.parse(localStorage.getItem("history")) || [];

const labels = history.map((_,i)=>"S"+(i+1));
const acc = history.map(h=>h.accuracy);

// MOVING AVERAGE (window = 3)
function movingAvg(arr, size=3){
  let res=[];
  for(let i=0;i<arr.length;i++){
    let start=Math.max(0,i-size+1);
    let slice=arr.slice(start,i+1);
    res.push(slice.reduce((a,b)=>a+b,0)/slice.length);
  }
  return res;
}

const smooth = movingAvg(acc,3);

new Chart(chart,{
  type:"line",
  data:{
    labels,
    datasets:[
      {
        label:"Accuracy",
        data:acc,
        borderColor:"red",
        tension:0.2
      },
      {
        label:"Trend (Moving Avg)",
        data:smooth,
        borderColor:"lime",
        tension:0.3
      }
    ]
  },
  options:{
    scales:{y:{min:0,max:100}}
  }
});
</script>

</body>
</html>
