<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Performance</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #121212;
  color: white;
}

.navbar {
  width: 100%;
  height: 60px;
  background: #1f1f1f;
  display: flex;
  align-items: center;
  padding: 0 15px;
  position: fixed;
  top: 0;
}

.hamburger { font-size: 26px; cursor: pointer; }

.sidebar {
  position: fixed;
  top: 0;
  left: -250px;
  width: 250px;
  height: 100%;
  background: #1e1e1e;
  padding-top: 60px;
  transition: 0.3s;
}

.sidebar.open { left: 0; }

.sidebar a {
  display: block;
  padding: 15px;
  color: white;
  text-decoration: none;
}

.content {
  margin-top: 100px;
  text-align: center;
}

.chart {
  width: 80%;
  margin: auto;
}

.bar {
  height: 20px;
  background: limegreen;
  margin: 6px 0;
  text-align: left;
  padding-left: 6px;
}
</style>
</head>

<body>

<div class="navbar">
  <div class="hamburger" id="hamburger">☰</div>
</div>

<div class="sidebar" id="sidebar">
  <a href="index.html">Alignment Challenge</a>
  <a href="index.html">Contrast Challenge</a>
  <a href="index.html">Frequency Challenge</a>
  <a href="performance.html">View Performance</a>
</div>

<div class="content">
  <h2>Performance History</h2>
  <div class="chart" id="chart"></div>
</div>

<script>
const sidebar=document.getElementById("sidebar");
const hamburger=document.getElementById("hamburger");

hamburger.onclick=e=>{
e.stopPropagation();
sidebar.classList.toggle("open");
};

document.addEventListener("click",e=>{
if(!sidebar.contains(e.target)&&!hamburger.contains(e.target))
sidebar.classList.remove("open");
});

const h=JSON.parse(localStorage.getItem("history"))||[];
const chart=document.getElementById("chart");

if(!h.length){
chart.innerHTML="<p>No data yet</p>";
}else{
h.forEach((x,i)=>{
const d=document.createElement("div");
d.className="bar";
d.style.width=x.accuracy+"%";
d.textContent=`Session ${i+1} — ${x.accuracy}%`;
chart.appendChild(d);
});
}
</script>

</body>
</html>
