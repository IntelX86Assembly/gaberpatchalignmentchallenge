<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Performance</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #121212;
  color: white;
}

.navbar {
  width: 100%;
  height: 60px;
  background: #1f1f1f;
  display: flex;
  align-items: center;
  padding: 0 15px;
  position: fixed;
  top: 0;
  z-index: 1000;
}

.hamburger {
  font-size: 26px;
  cursor: pointer;
}

.sidebar {
  position: fixed;
  top: 0;
  left: -250px;
  width: 250px;
  height: 100%;
  background: #1e1e1e;
  padding-top: 60px;
  transition: 0.3s;
}

.sidebar.open { left: 0; }

.sidebar a {
  display: block;
  padding: 15px;
  color: white;
  text-decoration: none;
}

.sidebar a:hover { background: #333; }

.content {
  margin-top: 80px;
  text-align: center;
}

canvas {
  background: #1a1a1a;
  border-radius: 10px;
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="navbar">
  <div class="hamburger" id="hamburger">☰</div>
</div>

<div id="sidebar" class="sidebar">
  <a href="index.html">Alignment Challenge</a>
  <a href="contrast.html">Contrast Challenge</a>
  <a href="frequency.html">Frequency Challenge</a>
  <a href="performance.html">View Performance</a>
</div>

<div class="content">
  <h2>Performance Over Time</h2>
  <canvas id="chart" width="800" height="450"></canvas>
</div>

<script>
const sidebar = document.getElementById("sidebar");
const hamburger = document.getElementById("hamburger");

hamburger.onclick = e => {
  e.stopPropagation();
  sidebar.classList.toggle("open");
};

document.addEventListener("click", e => {
  if (!sidebar.contains(e.target) && !hamburger.contains(e.target)) {
    sidebar.classList.remove("open");
  }
});

const canvas = document.getElementById("chart");
const ctx = canvas.getContext("2d");

/* =========================
   SAFE DATA LOADER
   ========================= */
function loadHistory() {
  try {
    const data = localStorage.getItem("history");
    if (!data) return [];
    return JSON.parse(data);
  } catch (e) {
    console.warn("Bad history data:", e);
    return [];
  }
}

/* =========================
   DRAW GRAPH
   ========================= */
function draw() {
  const history = loadHistory();

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const padding = 60;
  const w = canvas.width - padding * 2;
  const h = canvas.height - padding * 2;

  /* GRID */
  ctx.strokeStyle = "#2a2a2a";
  ctx.lineWidth = 1;

  for (let i = 0; i <= 10; i++) {
    let y = padding + (h / 10) * i;
    ctx.beginPath();
    ctx.moveTo(padding, y);
    ctx.lineTo(padding + w, y);
    ctx.stroke();
  }

  /* EMPTY STATE */
  if (history.length === 0) {
    ctx.fillStyle = "white";
    ctx.font = "16px Arial";
    ctx.fillText("No training data yet", 300, 220);
    return;
  }

  const maxY = 100;
  const scaleX = w / (history.length - 1 || 1);
  const scaleY = h / maxY;

  const getX = i => padding + i * scaleX;
  const getY = y => padding + (maxY - y) * scaleY;

  /* LINE */
  ctx.strokeStyle = "limegreen";
  ctx.lineWidth = 2;
  ctx.beginPath();

  history.forEach((d, i) => {
    const y = getY(d.accuracy);
    if (i === 0) ctx.moveTo(getX(i), y);
    else ctx.lineTo(getX(i), y);
  });

  ctx.stroke();

  /* POINTS */
  ctx.fillStyle = "white";
  history.forEach((d, i) => {
    ctx.beginPath();
    ctx.arc(getX(i), getY(d.accuracy), 3, 0, Math.PI * 2);
    ctx.fill();
  });

  /* LABELS */
  ctx.fillStyle = "white";
  ctx.font = "14px Arial";
  ctx.fillText("Learning Curve", canvas.width / 2 - 50, 25);
  ctx.fillText("Session", canvas.width / 2 - 30, canvas.height - 10);
  ctx.save();
  ctx.translate(20, canvas.height / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.fillText("Accuracy (%)", 0, 0);
  ctx.restore();
}

/* AUTO REFRESH (important) */
draw();
setInterval(draw, 1000);
window.addEventListener("focus", draw);
</script>

</body>
</html>
